// ── Helpers ───────────────────────────────────────────────────────────────────
function today(){ return new Date().toISOString().slice(0,10); }
function genId(){ return "b"+Date.now()+Math.random().toString(36).slice(2,6); }
function fmt(s){ if(!s)return"—"; try{ return new Date(s+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }catch{return s;} }
function isWeekday(){ const d=new Date().getDay(); return d>=1&&d<=5; }
function haversine(a,b){ const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }

async function fbDel(id){ await deleteDoc(doc(db,"businesses",id)); }
async function fbUpdate(id,data){ await updateDoc(doc(db,"businesses",id),data); }
async function fbGetSchedules(){ try{ const s=await getDocs(collection(db,"schedules")); return s.docs.map(d=>d.data()); }catch{return[];} }

// ── Claude AI ─────────────────────────────────────────────────────────────────
async function callClaude(prompt, system="You are a helpful assistant."){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1500,
      system,
      messages:[{role:"user",content:prompt}]
    })
  });
  const d = await res.json();
  return d.content?.map(c=>c.text||"").join("") || "";
}

async function callClaudeWithSearch(prompt){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:2000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}]
    })
  });
  const d = await res.json();
  return d.content?.map(c=>c.text||"").join("") || "";
}

async function boot(){
  try {
    let data = await fbGetAll();
    if(data.length===0){
      for(const b of SEED){ await fbSet(b); }
      data = SEED;
    }
    const schedules = await fbGetSchedules();
    setState({centers:data,schedules,loading:false});
    if(isWeekday()) checkAutoSchedule(data);
  } catch(e){
    console.error(e);
    setState({centers:SEED,loading:false});
    notify("⚠ Firebase offline — using local data");
  }
}

async function generateAISchedule(centers){
  setState({aiLoading:true, aiMessage:"🤖 AI Agent is building today's schedule…"});
  const summary = centers.map(c=>`${c.name}|${c.city}|${c.status}|${c.assignedTo}|nextAction:${c.nextAction||"none"}|activities:${c.activities.length}`).join("\n");
  const prompt = `You are a sales route optimizer for Union Delta, a PPF (paint protection film) distributor in the GCC region.

Today is ${today()} (${new Date().toLocaleDateString("en-GB",{weekday:"long"})}).

Here is the full list of detailing centers in the database:
${summary}

Your task:
1. Select the BEST 6-8 businesses to visit TODAY based on:
   - Hot leads first, then Warm, then Cold with no recent activity
   - Overdue follow-ups (nextAction date passed)
   - Group by city to minimize travel time
   - Spread across different assignees if possible
2. For each stop suggest a time slot starting 9:30am, ~1hr per visit
3. Give a brief reason why each was selected
4. Give one overall sales tip for today

Respond ONLY in this exact JSON format:
{
  "stops": [
    {"businessName":"...","city":"...","time":"09:30","reason":"...","priority":"High/Medium/Low"}
  ],
  "salesTip": "..."
}`;

  try {
    const raw = await callClaude(prompt,"You are a sales AI agent. Always respond with valid JSON only, no markdown.");
    const clean = raw.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);
    setState({aiSchedule:parsed, aiLoading:false, aiMessage:"", page:"schedule"});
    notify("✅ AI schedule ready for today!");
  } catch(e) {
    setState({aiLoading:false, aiMessage:""});
    notify("⚠ AI schedule generation failed");
  }
}

async function runFinder(){
  const q = state.finderQuery.trim();
  if(!q) return;
  setState({finderLoading:true, finderResults:[]});
  const prompt = `Search for PPF (paint protection film), window tinting, and auto detailing businesses in: "${q}"

Use web search to find real businesses. For each business found, extract:
- Business name
- City and country
- Phone number (if available)
- Website (if available)
- Services offered (PPF/tint/ceramic etc)
- Any contact person name

Return ONLY valid JSON array, no markdown:
[
  {"name":"...","city":"...","country":"...","phone":"...","website":"...","notes":"...","contact":"..."}
]

Find at least 5-10 real businesses if possible.`;

  try {
    const raw = await callClaudeWithSearch(prompt);
    const match = raw.match(/\[[\s\S]*\]/);
    if(!match) throw new Error("No JSON array found");
    const results = JSON.parse(match[0]);
    setState({finderResults:results, finderLoading:false});
  } catch(e) {
    setState({finderLoading:false});
    notify("⚠ Search failed. Try a more specific query.");
  }
}

// ── Schedule Builder ──────────────────────────────────────────────────────────
function buildManualSchedule(){
  const coord = CITY_COORDS[state.schedCity];
  if(!coord){ notify("⚠ City not found"); return; }
  const cityCenters = state.centers.filter(c=>c.city===state.schedCity);
  if(cityCenters.length===0){ notify("⚠ No businesses in this city"); return; }
  const remaining=[...cityCenters]; const route=[]; let cur=coord;
  while(route.length<8&&remaining.length>0){
    let best=0,bestDist=Infinity;
    remaining.forEach((c,i)=>{ const cc=CITY_COORDS[c.city]||coord; const d=haversine(cur,cc); if(d<bestDist){bestDist=d;best=i;} });
    route.push({...remaining[best],scheduledTime:`${(9+route.length).toString().padStart(2,"0")}:30`,done:false,outcome:""});
    cur=CITY_COORDS[remaining[best].city]||coord;
    remaining.splice(best,1);
  }
  setState({schedList:route});
}

  await fbSetSchedule(s);

  notify("✅ Schedule saved to cloud!");
}

// ── Filtered List ─────────────────────────────────────────────────────────────
function getFiltered(){
  return state.centers.filter(c=>{
    if(state.filterStatus!=="All"&&c.status!==state.filterStatus)return false;
    if(state.filterCountry!=="All"&&c.country!==state.filterCountry)return false;
    if(state.filterAssigned!=="All"&&c.assignedTo!==state.filterAssigned)return false;
    const q=state.search.toLowerCase();
    if(q&&!c.name.toLowerCase().includes(q)&&!c.contact.toLowerCase().includes(q)&&!c.city.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{
    if(state.sortBy==="country")return COUNTRIES.indexOf(a.country)-COUNTRIES.indexOf(b.country)||a.name.localeCompare(b.name);
    if(state.sortBy==="name")return a.name.localeCompare(b.name);
    if(state.sortBy==="status")return STATUS_OPTIONS.indexOf(a.status)-STATUS_OPTIONS.indexOf(b.status);
    if(state.sortBy==="nextAction"){if(!a.nextAction)return 1;if(!b.nextAction)return -1;return a.nextAction.localeCompare(b.nextAction);}
    return 0;
  });
}

  const pages = {list:buildList,detail:buildDetail,schedule:buildSchedule,report:buildReport,finder:buildFinder,chat:buildChat};
  const content = (pages[state.page]||buildList)();
  return `
    <div style="min-height:100vh;background:#0b0f1a;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;">
      ${buildNav()}
      ${content}
      ${state.toast?`<div style="position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#334155;color:white;padding:.75rem 1.25rem;border-radius:1rem;font-size:.85rem;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,.4)">${state.toast}</div>`:""}
      ${state.aiLoading?`<div style="position:fixed;bottom:1.5rem;right:1rem;background:#1e293b;border:1px solid #f59e0b44;color:#fbbf24;padding:.75rem 1rem;border-radius:1rem;font-size:.8rem;max-width:280px;z-index:98">🤖 ${state.aiMessage}</div>`:""}
    </div>`;
}

function buildNav(){
  const tabs=[["list","🏢","Centers"],["schedule","🗺","Schedule"],["finder","🔍","Finder"],["chat","🤖","AI Agent"],["report","📊","Report"]];
  return `<div style="background:#0f172a;border-bottom:1px solid #1e293b;padding:.75rem 1rem;position:sticky;top:0;z-index:10">
    <div style="max-width:700px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
        <div><p style="font-size:.7rem;color:#f59e0b;font-weight:700;letter-spacing:.1em;text-transform:uppercase">Union Delta</p>
        <p style="font-size:1rem;font-weight:700;color:white">GCC PPF CRM <span style="font-size:.65rem;color:#10b981;margin-left:.5rem">● Live</span></p></div>
        <div style="font-size:.7rem;color:#475569">${new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</div>

      <div style="display:flex;gap:.35rem">
        ${tabs.map(([p,icon,label])=>`<button onclick="setPage('${p}')" style="flex:1;padding:.4rem .2rem;border-radius:.75rem;font-size:.7rem;font-weight:600;border:none;cursor:pointer;transition:all .2s;background:${state.page===p?"#f59e0b":"#1e293b"};color:${state.page===p?"#0f172a":"#64748b"}">${icon} ${label}</button>`).join("")}

}

function card(content, extra=""){
  return `<div style="background:#0f172a;border-radius:1rem;padding:1.25rem;border:1px solid #1e293b;margin-bottom:.75rem ${extra}">${content}</div>`;
}
function sectionTitle(t){ return `<p style="font-size:.65rem;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem">${t}</p>`; }
function badge(status){ const c=STATUS_CFG[status]||STATUS_CFG.Cold; return `<span style="background:${c.bg};color:${c.text};border:1px solid ${c.border};padding:.2rem .6rem;border-radius:2rem;font-size:.7rem;font-weight:600">${c.label}</span>`; }
function inp(id,val,placeholder,type="text"){ return `<input id="${id}" type="${type}" value="${(val||"").replace(/"/g,"&quot;")}" placeholder="${placeholder}" style="width:100%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:.75rem;padding:.5rem .75rem;font-size:.8rem;box-sizing:border-box;outline:none" oninput="handleInp(this)"/>`; }
function sel(id,val,opts){ return `<select id="${id}" style="width:100%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:.75rem;padding:.5rem .75rem;font-size:.8rem;outline:none" onchange="handleInp(this)">${opts.map(o=>`<option value="${o}" ${val===o?"selected":""}>${o}</option>`).join("")}</select>`; }
function btn(label,onclick,style=""){ return `<button onclick="${onclick}" style="padding:.6rem 1.25rem;border-radius:.75rem;border:none;cursor:pointer;font-weight:700;font-size:.8rem;${style}">${label}</button>`; }

// ── List Page ─────────────────────────────────────────────────────────────────
function buildList(){
  const filtered=getFiltered();
  const todayStr=today();
  const byCountry=COUNTRIES.map(co=>({name:co,flag:FLAGS[co],count:state.centers.filter(c=>c.country===co).length,hot:state.centers.filter(c=>c.country===co&&c.status==="Hot").length}));
  const hot=state.centers.filter(c=>c.status==="Hot").length;
  const due=state.centers.filter(c=>c.nextAction===todayStr).length;
  const over=state.centers.filter(c=>c.nextAction&&c.nextAction<todayStr).length;
  const todayV=state.centers.flatMap(c=>c.activities).filter(a=>a.date===todayStr&&a.type==="Visit").length;

  return `<div style="max-width:700px;margin:0 auto;padding:1rem">
    <!-- KPI Strip -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.75rem">
      ${[["Total",state.centers.length,"#fff"],["🔥 Hot",hot,"#f87171"],["📅 Today",due,"#fbbf24"],["🏪 Visits",todayV,"#a78bfa"]].map(([l,v,c])=>`
        <div style="background:#0f172a;border:1px solid #1e293b;border-radius:.75rem;padding:.75rem;text-align:center">
          <p style="font-size:1.3rem;font-weight:700;color:${c}">${v}</p>
          <p style="font-size:.65rem;color:#475569;margin-top:.15rem">${l}</p>
        </div>`).join("")}
    </div>
    <!-- Country tiles -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.75rem">
      ${byCountry.map(c=>`
        <button onclick="setFilter('country','${c.name}')" style="background:${state.filterCountry===c.name?"rgba(245,158,11,.12)":"#0f172a"};border:1px solid ${state.filterCountry===c.name?"#f59e0b66":"#1e293b"};border-radius:.75rem;padding:.6rem;text-align:center;cursor:pointer;transition:all .2s">
          <p style="font-size:1.2rem">${c.flag}</p>
          <p style="font-size:1rem;font-weight:700;color:white">${c.count}</p>
          <p style="font-size:.6rem;color:#475569">${c.name}</p>
          ${c.hot>0?`<p style="font-size:.6rem;color:#f87171;font-weight:600">🔥${c.hot}</p>`:""}
        </button>`).join("")}
    </div>
    <!-- Add btn -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">
      <p style="font-size:.65rem;color:#475569;text-transform:uppercase;letter-spacing:.08em">${filtered.length} of ${state.centers.length} businesses</p>
      <button onclick="setState({showAdd:!state.showAdd})" style="background:#f59e0b;color:#0f172a;border:none;border-radius:2rem;padding:.5rem 1rem;font-weight:700;font-size:.8rem;cursor:pointer">+ Add</button>
    </div>
    <!-- Add Form -->
    ${state.showAdd?`
      <div style="background:#0f172a;border:1px solid #f59e0b44;border-radius:1rem;padding:1.25rem;margin-bottom:.75rem">
        ${sectionTitle("New Business")}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
          <div style="grid-column:1/-1"><label style="font-size:.65rem;color:#64748b">Name *</label>${inp("nc_name",state.newCenter.name,"Business name")}</div>
          <div><label style="font-size:.65rem;color:#64748b">Contact</label>${inp("nc_contact",state.newCenter.contact,"Owner/Manager")}</div>
          <div><label style="font-size:.65rem;color:#64748b">Phone</label>${inp("nc_phone",state.newCenter.phone,"+971...")}</div>
          <div><label style="font-size:.65rem;color:#64748b">Country</label>${sel("nc_country",state.newCenter.country,COUNTRIES)}</div>
          <div><label style="font-size:.65rem;color:#64748b">City</label>${inp("nc_city",state.newCenter.city,"City")}</div>
          <div><label style="font-size:.65rem;color:#64748b">Area</label>${inp("nc_area",state.newCenter.area,"District/Area")}</div>
          <div><label style="font-size:.65rem;color:#64748b">Status</label>${sel("nc_status",state.newCenter.status,STATUS_OPTIONS)}</div>
          <div><label style="font-size:.65rem;color:#64748b">Assign to</label>${sel("nc_assigned",state.newCenter.assignedTo,TEAM)}</div>
          <div><label style="font-size:.65rem;color:#64748b">Follow-up</label>${inp("nc_next",state.newCenter.nextAction,"","date")}</div>
          <div style="grid-column:1/-1"><label style="font-size:.65rem;color:#64748b">Notes</label><textarea id="nc_notes" placeholder="Services, notes…" style="width:100%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:.75rem;padding:.5rem .75rem;font-size:.8rem;box-sizing:border-box;outline:none;resize:none;height:4rem" oninput="handleInp(this)">${state.newCenter.notes||""}</textarea></div>
        </div>
        <div style="display:flex;gap:.5rem;margin-top:.75rem">
          ${btn("Save Business","handleAdd()","background:#f59e0b;color:#0f172a")}
          ${btn("Cancel","setState({showAdd:false})","background:#1e293b;color:#94a3b8")}
        </div>
      </div>`:""}
    <!-- Filters -->
    <div style="background:#0f172a;border:1px solid #1e293b;border-radius:1rem;padding:1rem;margin-bottom:.75rem">
      <input id="search_inp" value="${state.search}" placeholder="🔍  Search businesses, cities…" style="width:100%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:.75rem;padding:.6rem .75rem;font-size:.8rem;box-sizing:border-box;outline:none;margin-bottom:.6rem" oninput="setState({search:this.value})"/>
      <div style="display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.5rem">
        ${["All",...STATUS_OPTIONS].map(s=>`<button onclick="setFilter('status','${s}')" style="padding:.3rem .7rem;border-radius:2rem;border:none;cursor:pointer;font-size:.7rem;font-weight:600;background:${state.filterStatus===s?"#f59e0b":"#1e293b"};color:${state.filterStatus===s?"#0f172a":"#64748b"}">${s==="All"?"All Status":STATUS_CFG[s].label}</button>`).join("")}
        <select onchange="setFilter('assigned',this.value)" style="margin-left:auto;background:#1e293b;border:1px solid #334155;color:#64748b;border-radius:2rem;padding:.3rem .7rem;font-size:.7rem;outline:none">
          <option value="All" ${state.filterAssigned==="All"?"selected":""}>All Team</option>
          ${TEAM.map(m=>`<option value="${m}" ${state.filterAssigned===m?"selected":""}>${m}</option>`).join("")}
        </select>
      </div>
      <div style="display:flex;gap:.35rem;align-items:center">
        <span style="font-size:.65rem;color:#334155">Sort:</span>
        ${[["country","Country"],["status","Status"],["name","Name"],["nextAction","Follow-up"]].map(([v,l])=>`<button onclick="setState({sortBy:'${v}'})" style="padding:.2rem .5rem;border-radius:.4rem;border:none;cursor:pointer;font-size:.65rem;background:${state.sortBy===v?"rgba(245,158,11,.15)":"transparent"};color:${state.sortBy===v?"#fbbf24":"#475569"}">${l}</button>`).join("")}
      </div>
    </div>
    <!-- Cards -->
    <div>
      ${filtered.length===0?`<div style="text-align:center;padding:3rem"><p style="font-size:2rem">🔍</p><p style="color:#475569;font-size:.85rem;margin-top:.5rem">No businesses match.</p></div>`:""}
      ${filtered.map(c=>{
        const isOver=c.nextAction&&c.nextAction<todayStr;
        const isDue=c.nextAction===todayStr;
        const acts=c.activities||[];
        const vCount=acts.filter(a=>a.type==="Visit").length;
        const cCount=acts.filter(a=>a.type==="Call").length;
        const wCount=acts.filter(a=>a.type==="WhatsApp").length;
        return `<div onclick="setPage('detail','${c.id}')" style="background:#0f172a;border:1px solid #1e293b;border-radius:1rem;padding:1rem;margin-bottom:.5rem;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='#334155'" onmouseout="this.style.borderColor='#1e293b'">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap">
                <span>${FLAGS[c.country]||""}</span>
                <span style="font-weight:700;color:white;font-size:.9rem">${c.name}</span>
                ${badge(c.status)}
              </div>
              <p style="font-size:.7rem;color:#475569;margin-top:.2rem">${c.city}${c.area?", "+c.area:""} · <span style="color:#f59e0b88">${c.assignedTo||""}</span></p>
            </div>
            <span style="color:#334155;font-size:1.1rem">›</span>
          </div>
          <div style="display:flex;align-items:center;gap:.4rem;margin-top:.6rem;flex-wrap:wrap">
            ${vCount>0?`<span style="background:rgba(167,139,250,.1);color:#a78bfa;padding:.15rem .5rem;border-radius:2rem;font-size:.65rem;font-weight:600">🏪 ${vCount}</span>`:""}
            ${cCount>0?`<span style="background:rgba(52,211,153,.1);color:#34d399;padding:.15rem .5rem;border-radius:2rem;font-size:.65rem;font-weight:600">📞 ${cCount}</span>`:""}
            ${wCount>0?`<span style="background:rgba(74,222,128,.1);color:#4ade80;padding:.15rem .5rem;border-radius:2rem;font-size:.65rem;font-weight:600">💬 ${wCount}</span>`:""}
            ${acts.length===0?`<span style="font-size:.65rem;color:#334155">No activity yet</span>`:""}
            ${c.nextAction?`<span style="margin-left:auto;padding:.25rem .6rem;border-radius:2rem;font-size:.65rem;font-weight:600;background:${isOver?"rgba(239,68,68,.12)":isDue?"rgba(245,158,11,.12)":"#1e293b"};color:${isOver?"#f87171":isDue?"#fbbf24":"#475569"};border:1px solid ${isOver?"#ef444430":isDue?"#f59e0b30":"transparent"}">${isOver?"⚠ Overdue":isDue?"📅 Today":"📅 "+c.nextAction}</span>`:`<span style="margin-left:auto;font-size:.65rem;color:#334155">No date</span>`}
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

// ── Detail Page ───────────────────────────────────────────────────────────────
function buildDetail(){
  const c=state.centers.find(x=>x.id===state.selectedId);
  if(!c) return buildList();
  const todayStr=today();
  const isOver=c.nextAction&&c.nextAction<todayStr;
  const isDue=c.nextAction===todayStr;
  const e=state.editing;
  return `<div style="max-width:700px;margin:0 auto;padding:1rem">

// ── Report Page ───────────────────────────────────────────────────────────────
function buildReport(){
  const todayStr=today();
  const allActs=state.centers.flatMap(c=>c.activities||[]);
  const todayActs=allActs.filter(a=>a.date===todayStr);
  const d=new Date(); d.setDate(d.getDate()-d.getDay()+1);
  const ws=d.toISOString().slice(0,10);
  const we=new Date(d.getTime()+6*86400000).toISOString().slice(0,10);
  const weekActs=allActs.filter(a=>a.date>=ws&&a.date<=we);
  const weekVisits=weekActs.filter(a=>a.type==="Visit");
  const pct=Math.min(100,Math.round(weekVisits.length/state.weekTarget*100));
  const outcomes=OUTCOMES.map(o=>({name:o,count:allActs.filter(a=>a.type==="Visit"&&a.outcome===o).length})).filter(o=>o.count>0);
  const teamStats=TEAM.filter(m=>m!=="Unassigned").map(m=>({name:m,v:allActs.filter(a=>a.by===m&&a.type==="Visit").length,c:allActs.filter(a=>a.by===m&&a.type==="Call").length}));
  return `<div style="max-width:700px;margin:0 auto;padding:1rem">
    <!-- Weekly target -->
    <div style="background:#0f172a;border:1px solid #1e293b;border-radius:1rem;padding:1.25rem;margin-bottom:.75rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
        ${sectionTitle("Weekly Visit Target")}
        <div style="display:flex;align-items:center;gap:.4rem">
          <button onclick="setState({weekTarget:Math.max(1,state.weekTarget-5)})" style="background:#1e293b;border:none;color:#94a3b8;width:1.75rem;height:1.75rem;border-radius:.4rem;cursor:pointer;font-weight:700">-</button>
          <span style="color:white;font-weight:700;width:2rem;text-align:center">${state.weekTarget}</span>
          <button onclick="setState({weekTarget:state.weekTarget+5})" style="background:#1e293b;border:none;color:#94a3b8;width:1.75rem;height:1.75rem;border-radius:.4rem;cursor:pointer;font-weight:700">+</button>
        </div>
      </div>
      <p style="font-size:2.5rem;font-weight:700;color:${pct>=100?"#10b981":pct>=60?"#fbbf24":"#f87171"}">${weekVisits.length} <span style="font-size:1rem;color:#475569">/ ${state.weekTarget} visits</span></p>
      <div style="background:#1e293b;border-radius:2rem;height:.5rem;margin:.5rem 0">
        <div style="height:.5rem;border-radius:2rem;background:${pct>=100?"#10b981":pct>=60?"#f59e0b":"#ef4444"};width:${pct}%;transition:width .5s"></div>
      </div>
      <p style="font-size:.65rem;color:#334155">${ws} → ${we}</p>
    </div>
    <!-- Today -->
    <div style="background:#0f172a;border:1px solid #1e293b;border-radius:1rem;padding:1.25rem;margin-bottom:.75rem">
      ${sectionTitle("Today's Activity")}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem">
        ${[["🏪 Visits",todayActs.filter(a=>a.type==="Visit").length,"#a78bfa"],["📞 Calls",todayActs.filter(a=>a.type==="Call").length,"#34d399"],["💬 WhatsApp",todayActs.filter(a=>a.type==="WhatsApp").length,"#4ade80"]].map(([l,v,c])=>`
          <div style="background:${c}1a;border-radius:.6rem;padding:.75rem;text-align:center">
            <p style="font-size:1.5rem;font-weight:700;color:${c}">${v}</p>
            <p style="font-size:.65rem;color:#475569;margin-top:.15rem">${l}</p>
          </div>`).join("")}
      </div>
    </div>
    <!-- Team -->
    ${teamStats.some(m=>m.v+m.c>0)?`
      <div style="background:#0f172a;border:1px solid #1e293b;border-radius:1rem;padding:1.25rem;margin-bottom:.75rem">
        ${sectionTitle("Team Performance (All Time)")}
        ${teamStats.filter(m=>m.v+m.c>0).map(m=>`
          <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.6rem">
            <div style="width:2rem;height:2rem;border-radius:50%;background:rgba(245,158,11,.2);color:#fbbf24;font-weight:700;font-size:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0">${m.name[0]}</div>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;margin-bottom:.25rem">
                <span style="font-size:.8rem;color:#e2e8f0;font-weight:500">${m.name}</span>
                <span style="font-size:.7rem;color:#475569">🏪 ${m.v} · 📞 ${m.c}</span>
              </div>
              <div style="background:#1e293b;border-radius:2rem;height:.35rem">
                <div style="height:.35rem;border-radius:2rem;background:#f59e0b;width:${Math.min(100,(m.v+m.c)/Math.max(1,...teamStats.map(x=>x.v+x.c))*100)}%"></div>
              </div>
            </div>
          </div>`).join("")}
      </div>`:""}
    <!-- Outcomes -->
    ${outcomes.length>0?`
      <div style="background:#0f172a;border:1px solid #1e293b;border-radius:1rem;padding:1.25rem">
        ${sectionTitle("Visit Outcomes (All Time)")}
        ${outcomes.sort((a,b)=>b.count-a.count).map(o=>`
          <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem">
            <span style="font-size:.8rem;color:#94a3b8;flex:1">${o.name}</span>
            <span style="font-size:.8rem;font-weight:700;color:white;width:1.5rem;text-align:right">${o.count}</span>
            <div style="background:#1e293b;border-radius:2rem;height:.35rem;width:6rem">
              <div style="height:.35rem;border-radius:2rem;background:#f59e0b;width:${o.count/outcomes[0].count*100}%"></div>
            </div>
          </div>`).join("")}
      </div>`:""}
  </div>`;
}

// ── Event Handlers ────────────────────────────────────────────────────────────
function attachEvents(){
  // expose globals
  window.setState = (patch, cb) => { state={...state,...patch}; render(); if(cb) cb(); };
  window.setPage = (p, id) => setState({page:p, selectedId:id||state.selectedId});
  window.setFilter = (type,val) => {
    if(type==="country") setState({filterCountry:state.filterCountry===val?"All":val});
    if(type==="status") setState({filterStatus:val});
    if(type==="assigned") setState({filterAssigned:val});
  };
  window.handleInp = (el) => {
    const id=el.id, v=el.value;
    const ncMap={nc_name:"name",nc_contact:"contact",nc_phone:"phone",nc_country:"country",nc_city:"city",nc_area:"area",nc_status:"status",nc_assigned:"assignedTo",nc_next:"nextAction",nc_notes:"notes"};
    const naMap={na_date:"date",na_dur:"duration",na_outcome:"outcome",na_note:"note",na_by:"by"};
    const eMap={e_name:"name",e_contact:"contact",e_phone:"phone",e_country:"country",e_city:"city",e_area:"area",e_status:"status",e_assigned:"assignedTo",e_website:"website",e_notes:"notes"};
    if(ncMap[id]) state={...state,newCenter:{...state.newCenter,[ncMap[id]]:v}};
    else if(naMap[id]) state={...state,newAct:{...state.newAct,[naMap[id]]:v}};
    else if(eMap[id]) state={...state,editing:{...state.editing,[eMap[id]]:v}};
    else if(id==="search_inp") state={...state,search:v};
    else if(id==="finder_q") state={...state,finderQuery:v};
    else if(id==="chat_inp") state={...state,chatInput:v};
  };
  window.startEdit = () => {
    const c=state.centers.find(x=>x.id===state.selectedId);
    if(c) setState({editing:{name:c.name,contact:c.contact,phone:c.phone,country:c.country,city:c.city,area:c.area,status:c.status,nextAction:c.nextAction,notes:c.notes,website:c.website||"",assignedTo:c.assignedTo}});
  };
  window.handleAdd=handleAdd; window.handleSaveEdit=handleSaveEdit;
  window.handleAddAct=handleAddAct; window.handleDelAct=handleDelAct;
  window.handleStatus=handleStatus; window.handleNextAction=handleNextAction;
  window.handleDelete=handleDelete; window.openWA=openWA;
  window.generateAISchedule=generateAISchedule; window.buildManualSchedule=buildManualSchedule;
  window.saveSchedule=saveSchedule; window.markStopDone=markStopDone;
  window.runFinder=runFinder; window.addFoundBusiness=addFoundBusiness;
  window.sendChat=sendChat;
  window.moveStop=(i,dir)=>{
    const n=[...state.schedList]; const s=i+dir;
    if(s<0||s>=n.length)return;
    [n[i],n[s]]=[n[s],n[i]]; setState({schedList:n});
  };
  window.removeStop=(i)=>setState({schedList:state.schedList.filter((_,j)=>j!==i)});
  window.updateStopTime=(i,t)=>setState({schedList:state.schedList.map((s,j)=>j===i?{...s,scheduledTime:t}:s)});
  window.markStopDone=(schedId,idx,outcome)=>{
    const updated=state.schedules.map(s=>s.id!==schedId?s:{...s,stops:s.stops.map((st,i)=>i===idx?{...st,done:true,outcome}:st)});
    fbSetSchedule(updated.find(s=>s.id===schedId));
    setState({schedules:updated});
  };
  // Auto-scroll chat
  const chatEl=document.getElementById("chat_messages");
  if(chatEl) chatEl.scrollTop=chatEl.scrollHeight;
}

// Start
boot();
</script>
